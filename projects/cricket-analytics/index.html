<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE CODE — Cricket Analytics</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0f0f0f;
  --bg2:    #111111;
  --bg3:    #181818;
  --bd:     #242424;
  --text:   #e8e8e8;
  --muted:  #666666;
  --gold:   #ffd166;
  --edge:   #06d6a0;
  --font:   'Courier New', Courier, monospace;
  --pc:     #e63946;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ─── LAYOUT ────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 265px 1fr;
  height: 100vh;
}

/* ─── SIDEBAR ───────────────────────────────────────────────── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--bd);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sb-hdr {
  padding: 14px 12px 10px;
  background: #0a0a0a;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

.sb-hdr-title {
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 3px;
  color: var(--text);
}

.sb-hdr-sub {
  font-size: 6.5px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
}

.sb-hdr-count {
  font-size: 7px;
  color: var(--pc);
  margin-top: 7px;
  letter-spacing: 1px;
  transition: color 0.3s;
}

.sb-search {
  padding: 6px 8px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

.sb-search input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--bd);
  color: var(--text);
  font-family: var(--font);
  font-size: 8px;
  padding: 5px 8px;
  letter-spacing: 0.5px;
  outline: none;
  transition: border-color 0.2s;
}

.sb-search input:focus { border-color: var(--pc); }
.sb-search input::placeholder { color: #444; }

.sb-filters {
  padding: 6px 8px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  flex-shrink: 0;
}

.fb {
  background: var(--bg3);
  border: 1px solid var(--bd);
  color: var(--muted);
  font-family: var(--font);
  font-size: 6.5px;
  padding: 3px 8px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}

.fb:hover { color: var(--text); border-color: #444; }

.fb.active {
  color: var(--text);
  border-color: var(--pc);
  background: rgba(255,255,255,0.04);
}

.sb-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px;
  scrollbar-width: thin;
  scrollbar-color: #2a2a2a #111;
}

.sb-list::-webkit-scrollbar { width: 4px; }
.sb-list::-webkit-scrollbar-track { background: #111; }
.sb-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.sb-grp {
  font-size: 5.8px;
  color: #333;
  letter-spacing: 2px;
  padding: 8px 4px 3px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  cursor: pointer;
  border-left: 2.5px solid var(--ic);
  border-top: 1px solid transparent;
  border-right: 1px solid transparent;
  border-bottom: 1px solid transparent;
  margin-bottom: 2px;
  transition: background 0.12s, border-color 0.12s;
}

.sb-item:hover {
  background: rgba(255,255,255,0.03);
  border-top-color: var(--ic);
  border-right-color: var(--ic);
  border-bottom-color: var(--ic);
}

.sb-item.active {
  background: rgba(255,255,255,0.06);
  border-top-color: var(--ic);
  border-right-color: var(--ic);
  border-bottom-color: var(--ic);
}

.sb-item.hidden { display: none; }

.sb-name {
  font-size: 8px;
  font-weight: bold;
  letter-spacing: 0.3px;
  color: var(--text);
  flex: 1;
  line-height: 1.3;
}

.sb-badge {
  font-size: 5.5px;
  padding: 1px 4px;
  border: 1px solid;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.bd-lh     { color: #7fb3ff; border-color: #7fb3ff; background: rgba(127,179,255,0.08); }
.bd-spin   { color: #c77dff; border-color: #c77dff; background: rgba(199,125,255,0.08); }
.bd-short  { color: #ff9966; border-color: #ff9966; background: rgba(255,153,102,0.08); }
.bd-weapon { border-color: var(--ic); color: var(--ic); background: rgba(255,255,255,0.03); }

.kb-hint {
  font-size: 5.5px;
  color: #2a2a2a;
  text-align: center;
  padding: 4px;
  border-top: 1px solid var(--bd);
  background: #0a0a0a;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

/* ─── MAIN ──────────────────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.main-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--bd);
  background: var(--bg2);
  flex-shrink: 0;
}

.main-hdr-title { flex: 1; min-width: 0; }

.mh-name {
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;
  color: var(--text);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mh-sub {
  font-size: 8.5px;
  color: var(--pc);
  margin-top: 5px;
  letter-spacing: 0.3px;
  transition: color 0.3s;
}

.mh-badges {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-shrink: 0;
}

.mh-badge {
  font-size: 6.5px;
  padding: 3px 8px;
  border: 1px solid;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.mhb-weapon { color: var(--pc); border-color: var(--pc); background: rgba(255,255,255,0.03); }
.mhb-lh     { color: #7fb3ff; border-color: #7fb3ff; background: rgba(127,179,255,0.06); }
.mhb-rh     { color: #88bb88; border-color: #88bb88; background: rgba(136,187,136,0.06); }
.mhb-spin   { color: #c77dff; border-color: #c77dff; background: rgba(199,125,255,0.06); }
.mhb-short  { color: #ff9966; border-color: #ff9966; background: rgba(255,153,102,0.06); }

.nav-ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.nav-btn {
  background: var(--bg3);
  border: 1px solid var(--bd);
  color: var(--muted);
  font-family: var(--font);
  font-size: 7.5px;
  padding: 5px 12px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}

.nav-btn:hover { border-color: var(--pc); color: var(--text); }

.nav-count {
  font-size: 7.5px;
  color: var(--muted);
  min-width: 42px;
  text-align: center;
}

/* Image area */
.img-area {
  flex: 1;
  min-height: 0;
  position: relative;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.img-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  transition: background 0.4s;
}

#player-img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  display: block;
  position: relative;
  z-index: 1;
  transition: opacity 0.18s;
  padding: 6px;
}

#player-img.fade { opacity: 0; }

/* Info strip */
.info-strip {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--bd);
}

.info-row1 {
  display: grid;
  grid-template-columns: 1.3fr 0.7fr 1.8fr 2fr;
  border-bottom: 1px solid var(--bd);
}

.icell {
  padding: 8px 12px;
  border-right: 1px solid var(--bd);
}

.icell:last-child { border-right: none; }

.ilbl {
  font-size: 5.5px;
  color: #3a3a3a;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.ilbl.mt { margin-top: 5px; }

.ival {
  font-size: 7.5px;
  color: var(--text);
  line-height: 1.45;
}

.ival.pc-col { color: var(--pc); transition: color 0.3s; }
.ival.gray   { color: #666; }
.ival.gold   { color: var(--gold); }
.ival.edge   { color: var(--edge); }

.info-row2 {
  padding: 7px 12px;
  display: flex;
  gap: 10px;
  align-items: baseline;
}

.ir2-lbl {
  font-size: 5.5px;
  color: #3a3a3a;
  letter-spacing: 1.5px;
  white-space: nowrap;
  flex-shrink: 0;
}

.ir2-text {
  font-size: 7.5px;
  color: #888;
  line-height: 1.55;
}
</style>
</head>
<body>

<div class="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="sb-hdr">
      <div class="sb-hdr-title">THE CODE</div>

      <div class="sb-hdr-count" id="sb-count">17 PLAYER STUDIES</div>
    </div>

    <div class="sb-search">
      <input type="text" id="search" placeholder="SEARCH PLAYER..." autocomplete="off" spellcheck="false">
    </div>

    <div class="sb-list" id="sb-list"></div>

  <!-- ═══ MAIN ═══ -->
  <main class="main">

    <div class="img-area">

    <div class="info-strip">

        <div class="icell">
          <div class="ilbl">BATS</div>
          <div class="ival" id="i-hand"></div>
          <div class="ilbl mt">THREAT</div>

        </div>

        </div>

        <div class="icell">
          <div class="ilbl">ADAPTATION</div>
          <div class="ival edge" id="i-adapt"></div>
        </div>

      </div>
      <div class="info-row2">
        <div class="ir2-lbl">ANALYSIS</div>
        <div class="ir2-text" id="i-analysis"></div>
      </div>
    </div>

  </main>
</div>

    adapt: 'N/A — this is the weapon, not the weakness',

/* ── STATE ───────────────────────────────────────────────────── */
let currentIdx    = 0;
let activeFilter  = 'all';
let searchQuery   = '';
let visibleIdxs   = PLAYERS.map((_, i) => i);   // indices currently showing

/* ── FILTER DEFINITIONS ─────────────────────────────────────── */
const FILTERS = [
  { key: 'all',    label: 'ALL (17)' },
  { key: 'rh',     label: 'RIGHT-HANDERS' },
  { key: 'lh',     label: 'LEFT-HANDERS' },
  { key: 'seam',   label: 'SEAM' },
  { key: 'spin',   label: 'SPIN BUNNIES' },
  { key: 'short',  label: 'SHORT BALL' },
  { key: 'weapon', label: '⚔ WEAPONS' },
];

/* ── INIT ────────────────────────────────────────────────────── */
function init() {
  buildFilters();
  buildSidebar();
  selectPlayer(0, false);

  document.getElementById('prev-btn').addEventListener('click', () => navigate(-1));
  document.getElementById('next-btn').addEventListener('click', () => navigate(+1));
  document.getElementById('search').addEventListener('input', onSearch);

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { e.preventDefault(); navigate(+1); }
  });
}

/* ── BUILD FILTER BUTTONS ───────────────────────────────────── */
function buildFilters() {
  const wrap = document.getElementById('sb-filters');
  FILTERS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'fb' + (f.key === 'all' ? ' active' : '');
    btn.textContent = f.label;
    btn.dataset.filter = f.key;
    btn.addEventListener('click', () => setFilter(f.key));
    wrap.appendChild(btn);
  });
}

/* ── BUILD SIDEBAR LIST ─────────────────────────────────────── */
function buildSidebar() {
  const list = document.getElementById('sb-list');
  list.innerHTML = '';

  const batsmen = PLAYERS.filter(p => !p.weapon);
  const weapons = PLAYERS.filter(p =>  p.weapon);

  appendGroup(list, 'BATSMEN WEAKNESSES', batsmen);
  appendGroup(list, '⚔ WEAPON CARDS', weapons);
}

function appendGroup(list, label, players) {
  if (!players.length) return;
  const grp = document.createElement('div');
  grp.className = 'sb-grp';
  grp.textContent = label;
  list.appendChild(grp);

  players.forEach(p => {
    const globalIdx = PLAYERS.indexOf(p);
    const item = document.createElement('div');
    item.className = 'sb-item';
    item.style.setProperty('--ic', p.color);
    item.dataset.idx = globalIdx;

    const name = document.createElement('div');
    name.className = 'sb-name';
    name.textContent = p.name;
    item.appendChild(name);

    if (p.weapon) {
      const b = mkBadge('⚔', 'bd-weapon');
      item.appendChild(b);
    } else if (p.hand === 'LH') {
      item.appendChild(mkBadge('LH', 'bd-lh'));
    }

    if (p.tags.includes('spin'))  item.appendChild(mkBadge('SPIN', 'bd-spin'));
    if (p.tags.includes('short')) item.appendChild(mkBadge('SHORT', 'bd-short'));

    item.addEventListener('click', () => {
      selectPlayer(globalIdx, true);
    });

    list.appendChild(item);
  });
}

function mkBadge(text, cls) {
  const b = document.createElement('span');
  b.className = 'sb-badge ' + cls;
  b.textContent = text;
  return b;
}

/* ── FILTER LOGIC ───────────────────────────────────────────── */
function setFilter(key) {
  activeFilter = key;
  document.querySelectorAll('.fb').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === key);
  });
  applyFilters();
}

function onSearch(e) {
  searchQuery = e.target.value.toUpperCase().trim();
  applyFilters();
}

function applyFilters() {
  visibleIdxs = [];
  document.querySelectorAll('.sb-item').forEach(item => {
    const idx = +item.dataset.idx;
    const p   = PLAYERS[idx];
    const filterMatch =
      activeFilter === 'all'    ? true :
      activeFilter === 'rh'     ? p.hand === 'RH' && !p.weapon :
      activeFilter === 'lh'     ? p.hand === 'LH' && !p.weapon :
      activeFilter === 'seam'   ? p.tags.includes('seam') :
      activeFilter === 'spin'   ? p.tags.includes('spin') :
      activeFilter === 'short'  ? p.tags.includes('short') :
      activeFilter === 'weapon' ? p.weapon :
      true;

    const searchMatch = !searchQuery || p.name.includes(searchQuery) || p.sub.toUpperCase().includes(searchQuery);

    if (filterMatch && searchMatch) {
      item.classList.remove('hidden');
      visibleIdxs.push(idx);
    } else {
      item.classList.add('hidden');
    }
  });

  const count = visibleIdxs.length;
  document.getElementById('sb-count').textContent =
    count === 17 ? '17 PLAYER STUDIES' : `${count} OF 17 SHOWN`;

  // If current player is now hidden, jump to first visible
  if (!visibleIdxs.includes(currentIdx) && visibleIdxs.length > 0) {
    selectPlayer(visibleIdxs[0], true);
  }
}

/* ── NAVIGATION ─────────────────────────────────────────────── */
function navigate(dir) {
  if (!visibleIdxs.length) return;
  const pos = visibleIdxs.indexOf(currentIdx);
  const next = (pos + dir + visibleIdxs.length) % visibleIdxs.length;
  selectPlayer(visibleIdxs[next], true);
}

/* ── SELECT PLAYER ──────────────────────────────────────────── */
function selectPlayer(idx, animate) {
  currentIdx = idx;
  const p   = PLAYERS[idx];

  // Update sidebar selection
  document.querySelectorAll('.sb-item').forEach(item => {
    item.classList.toggle('active', +item.dataset.idx === idx);
  });

  // Scroll sidebar item into view
  const activeItem = document.querySelector(`.sb-item[data-idx="${idx}"]`);
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Update CSS color
  document.documentElement.style.setProperty('--pc', p.color);

  // Glow background
  const glow = document.getElementById('img-glow');
  glow.style.background =
    `radial-gradient(ellipse at center, ${p.color}18 0%, transparent 70%)`;

  // Counter
  const pos = visibleIdxs.indexOf(idx);
  const countText = pos >= 0
    ? `${pos + 1} / ${visibleIdxs.length}` + (visibleIdxs.length < 17 ? '' : '')
    : `— / ${visibleIdxs.length}`;
  document.getElementById('nav-count').textContent = countText;

  // Header text
  document.getElementById('mh-name').textContent = p.name;
  document.getElementById('mh-sub').textContent  = p.sub;

  // Header badges
  const badgesEl = document.getElementById('mh-badges');
  badgesEl.innerHTML = '';
  if (p.weapon) {
    badgesEl.appendChild(mkHdrBadge('⚔ WEAPON CARD', 'mhb-weapon'));
  } else {
    badgesEl.appendChild(mkHdrBadge(p.hand === 'LH' ? '◀ LEFT-HANDED' : 'RIGHT-HANDED ▶',
                                    p.hand === 'LH' ? 'mhb-lh' : 'mhb-rh'));
  }
  if (p.tags.includes('spin'))  badgesEl.appendChild(mkHdrBadge('SPIN', 'mhb-spin'));
  if (p.tags.includes('short')) badgesEl.appendChild(mkHdrBadge('SHORT BALL', 'mhb-short'));

  // Info strip
  document.getElementById('i-bowler').textContent   = p.bowler;
  document.getElementById('i-series').textContent   = p.series;
  document.getElementById('i-hand').textContent     = p.hand === 'LH' ? 'LEFT-HANDED' : 'RIGHT-HANDED';
  document.getElementById('i-threat').textContent   = p.threat;
  document.getElementById('i-stat').textContent     = p.keyStat;
  document.getElementById('i-adapt').textContent    = p.adapt;
  document.getElementById('i-analysis').textContent = p.analysis;

  // Image
  const img = document.getElementById('player-img');
  if (animate) {
    img.classList.add('fade');
    setTimeout(() => {
      img.src = p.file;
      img.onload = () => img.classList.remove('fade');
      // Fallback if already cached
      if (img.complete && img.naturalWidth > 0) img.classList.remove('fade');
    }, 160);
  } else {
    img.src = p.file;
  }
}

function mkHdrBadge(text, cls) {
  const el = document.createElement('span');
  el.className = `mh-badge ${cls}`;
  el.textContent = text;
  return el;
}

/* ── START ───────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
